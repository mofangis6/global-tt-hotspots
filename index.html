<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>全球 TT 最新爆款分析</title>
  <style>
    :root {
      --bg: #edf2f7;
      --panel: #ffffff;
      --ink: #1f2933;
      --muted: #64748b;
      --line: #d8e1eb;
      --brand: #244968;
      --brand-dark: #18344f;
      --brand-soft: #dce8f3;
      --accent: #2f6f9f;
      --accent-soft: #e4eef7;
      --shadow: 0 18px 48px rgba(15, 35, 60, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.65;
    }

    a {
      color: inherit;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      min-height: 100vh;
    }

    .hero {
      color: #fff;
      min-height: 330px;
      background:
        linear-gradient(120deg, rgba(4, 16, 35, 0.88), rgba(11, 54, 80, 0.64)),
        url("./assets/cover-world-map.png");
      background-position: center;
      background-size: cover;
    }

    .hero-inner {
      display: flex;
      min-height: 330px;
      flex-direction: column;
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-mark {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.15);
    }

    .nav-meta {
      color: rgba(255, 255, 255, 0.78);
      font-size: 14px;
    }

    .hero-copy {
      display: flex;
      flex: 1;
      flex-direction: column;
      justify-content: center;
      max-width: 780px;
      padding-bottom: 22px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      color: #d8e7f6;
      font-size: 18px;
      font-weight: 800;
    }

    h1 {
      max-width: 840px;
      margin: 0;
      font-size: clamp(36px, 5.4vw, 68px);
      line-height: 1.06;
      letter-spacing: 0;
    }

    .hero-copy p {
      max-width: 680px;
      margin: 18px 0 0;
      color: rgba(255, 255, 255, 0.86);
      font-size: 18px;
    }

    .stats {
      display: none;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      width: min(1180px, calc(100% - 40px));
      margin: -34px auto 0;
      position: relative;
      z-index: 2;
    }

    .stat {
      min-height: 102px;
      padding: 20px;
      border: 1px solid rgba(226, 232, 240, 0.85);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: var(--shadow);
    }

    .stat strong {
      display: block;
      margin-bottom: 4px;
      color: var(--ink);
      font-size: 32px;
      line-height: 1.15;
    }

    .stat span {
      color: var(--muted);
      font-size: 14px;
    }

    .content {
      width: min(1600px, calc(100% - 40px));
      margin: 30px auto 58px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) 170px 180px 170px;
      gap: 12px;
      margin-bottom: 16px;
    }

    .field {
      position: relative;
    }

    .field svg {
      position: absolute;
      top: 50%;
      left: 12px;
      width: 18px;
      height: 18px;
      color: #94a3b8;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .search,
    .select {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: var(--panel);
      outline: none;
    }

    .search {
      padding: 0 14px 0 40px;
    }

    .select {
      padding: 0 12px;
    }

    .search:focus,
    .select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(36, 73, 104, 0.16);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .trend-summary {
      display: grid;
      gap: 16px;
      margin-bottom: 18px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
    }

    .trend-summary h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
    }

    .day-filter-panel {
      display: grid;
      gap: 14px;
      margin-bottom: 18px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
    }

    .day-filter-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .day-filter-head h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
    }

    .day-filter-head p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .day-tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .day-chip {
      display: grid;
      gap: 5px;
      min-width: 240px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      color: var(--ink);
      background: #f8fafc;
      text-align: left;
    }

    .day-chip strong {
      font-size: 24px;
      line-height: 1.1;
    }

    .day-chip span {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .day-chip:hover {
      border-color: rgba(36, 73, 104, 0.36);
      background: #edf4fa;
    }

    .day-chip.is-active {
      border-color: var(--brand);
      color: #fff;
      background: var(--brand);
    }

    .day-chip.is-active span {
      color: rgba(255, 255, 255, 0.82);
    }

    .region-chips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .region-filter-panel {
      display: grid;
      gap: 14px;
      margin-bottom: 16px;
      padding: 20px 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
    }

    .region-filter-panel h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
    }

    .region-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 8px 16px;
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      color: var(--brand-dark);
      background: var(--brand-soft);
      font-size: 15px;
      font-weight: 800;
    }

    .region-chip:hover {
      border-color: rgba(36, 73, 104, 0.36);
      background: #c8d9e8;
    }

    .region-chip.is-active {
      color: #fff;
      background: var(--brand);
    }

    .trend-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .trend-item {
      min-width: 0;
      padding: 16px;
      border-radius: 8px;
      background: #f8fafc;
    }

    .trend-item strong {
      display: block;
      margin-bottom: 4px;
      color: var(--brand-dark);
    }

    .trend-item p {
      margin: 0;
      color: #475569;
      font-size: 15px;
      line-height: 1.7;
      overflow-wrap: anywhere;
    }

    .trend-item .region-name {
      color: var(--accent);
    }

    .list {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
    }

    .feed-card {
      display: grid;
      grid-template-columns: 1fr;
      align-items: stretch;
    }

    .info-panel {
      min-width: 0;
    }

    .card-head {
      display: none;
      grid-template-columns: 40px minmax(0, 1fr);
      column-gap: 10px;
      row-gap: 8px;
      padding: 12px 12px 10px;
      border-bottom: 1px solid #edf2f7;
      align-items: start;
    }

    .rank {
      display: grid;
      width: 40px;
      height: 40px;
      place-items: center;
      border-radius: 8px;
      color: var(--brand-dark);
      background: var(--brand-soft);
      font-weight: 900;
    }

    .title-wrap {
      min-width: 0;
    }

    .category {
      margin-bottom: 2px;
      color: var(--brand);
      font-size: 12px;
      font-weight: 800;
    }

    .card h2 {
      margin: 0;
      display: -webkit-box;
      overflow: hidden;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      font-size: 16px;
      line-height: 1.35;
      letter-spacing: 0;
      max-width: 780px;
    }

    .metrics {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      grid-column: 1 / -1;
      justify-content: flex-start;
      min-width: 0;
    }

    .metric {
      padding: 4px 7px;
      border-radius: 8px;
      background: #f8fafc;
      color: #475569;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .card-body {
      padding: 11px 12px 12px;
    }

    .tags {
      display: none;
      gap: 6px;
      flex-wrap: wrap;
      max-height: 28px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 3px 8px;
      border-radius: 999px;
      color: #075985;
      background: #e0f2fe;
      font-size: 12px;
      font-weight: 700;
    }

    .analysis {
      display: none;
      max-height: 132px;
      overflow: auto;
      margin: 0 0 12px;
      padding: 10px 11px;
      border: 1px solid #dbe5ef;
      border-radius: 8px;
      color: #334155;
      background: #f8fbff;
      font-size: 13px;
      line-height: 1.65;
    }

    .analysis::-webkit-scrollbar {
      width: 6px;
    }

    .analysis::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: #adc0d2;
    }

    .analysis strong {
      color: var(--brand-dark);
    }

    .caption {
      display: none;
      margin: 0;
      padding: 13px 14px;
      border-left: 4px solid var(--accent);
      border-radius: 0 8px 8px 0;
      color: #475569;
      background: var(--accent-soft);
      word-break: break-word;
    }

    .caption strong {
      color: #9a3412;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 1 1 120px;
      min-height: 34px;
      padding: 0 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      font-size: 12px;
      font-weight: 800;
    }

    .btn-primary {
      color: #fff;
      background: var(--brand);
    }

    .btn-primary:hover {
      background: var(--brand-dark);
    }

    .btn-ghost {
      color: #334155;
      background: #fff;
      border-color: var(--line);
    }

    .btn-ghost:hover {
      border-color: #cbd5e1;
      background: #f8fafc;
    }

    .video-panel {
      display: flex;
      flex-direction: column;
      min-width: 0;
      order: -1;
      position: relative;
      padding: 0;
      border-bottom: 1px solid var(--line);
      border-left: 0;
      background: #0f172a;
    }

    .video-frame {
      display: grid;
      width: 100%;
      min-height: 660px;
      place-items: center;
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0)),
        #111827;
    }

    .tiktok-iframe {
      width: 100%;
      height: 660px;
      border: 0;
      background: #111827;
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 10px;
      padding: 14px;
      color: #f8fafc;
      background:
        linear-gradient(180deg, rgba(3, 7, 18, 0.2), rgba(3, 7, 18, 0.58) 42%, rgba(3, 7, 18, 0.94)),
        radial-gradient(circle at 50% 34%, rgba(47, 111, 159, 0.22), transparent 34%);
    }

    .video-overlay::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(2, 6, 23, 0.2);
      pointer-events: none;
    }

    .overlay-content {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 9px;
      min-height: 0;
    }

    .overlay-kicker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #cfe3f5;
      font-size: 12px;
      font-weight: 800;
    }

    .overlay-rank {
      display: inline-grid;
      min-width: 34px;
      height: 30px;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
    }

    .overlay-title {
      margin: 0;
      color: #fff;
      font-size: 18px;
      line-height: 1.35;
    }

    .overlay-metrics,
    .overlay-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .overlay-pill {
      padding: 3px 7px;
      border-radius: 999px;
      color: #dbeafe;
      background: rgba(219, 234, 254, 0.14);
      font-size: 11px;
      font-weight: 800;
    }

    .overlay-analysis {
      max-height: 154px;
      overflow: auto;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: #d6e0ea;
      background: rgba(15, 23, 42, 0.72);
      font-size: 12px;
      line-height: 1.62;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.38) transparent;
    }

    .overlay-analysis::-webkit-scrollbar {
      width: 6px;
    }

    .overlay-analysis::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.34);
    }

    .overlay-hint {
      position: relative;
      z-index: 1;
      padding: 8px 10px;
      border: 1px solid rgba(103, 232, 249, 0.24);
      border-radius: 8px;
      color: #bae6fd;
      background: rgba(14, 165, 233, 0.12);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    .feed-card.is-playing .video-overlay {
      display: none;
    }

    .video-fallback {
      display: grid;
      gap: 14px;
      width: 100%;
      padding: 28px 20px;
      color: #e2e8f0;
      text-align: center;
    }

    .video-fallback strong {
      font-size: 18px;
      color: #fff;
    }

    .video-fallback p {
      margin: 0;
      color: #cbd5e1;
      font-size: 14px;
    }

    .video-fallback .btn {
      justify-self: center;
    }

    .side {
      display: none;
      gap: 14px;
      position: sticky;
      top: 16px;
    }

    .panel {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
    }

    .panel h3 {
      margin: 0 0 12px;
      font-size: 17px;
      line-height: 1.3;
    }

    .insight-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
      color: #475569;
      font-size: 14px;
    }

    .insight-list li {
      padding-left: 14px;
      border-left: 3px solid var(--brand-soft);
    }

    .empty {
      display: none;
      padding: 34px;
      border: 1px dashed #cbd5e1;
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      background: #fff;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      padding: 11px 14px;
      border-radius: 8px;
      color: #fff;
      background: #0f172a;
      box-shadow: var(--shadow);
      transition: 0.2s ease;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    @media (max-width: 1280px) {
      .list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 980px) {
      .toolbar,
      .layout,
      .trend-grid {
        grid-template-columns: 1fr;
      }

      .list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .side {
        position: static;
      }
    }

    @media (max-width: 760px) {
      .list {
        grid-template-columns: 1fr;
      }

      .feed-card {
        grid-template-columns: 1fr;
      }

      .video-panel {
        border-top: 0;
        border-left: 0;
      }

      .video-frame {
        min-height: 660px;
      }

      .tiktok-iframe {
        height: 660px;
      }
    }

    @media (max-width: 640px) {
      .hero-inner,
      .stats,
      .content {
        width: min(100% - 28px, 1180px);
      }

      .hero-inner {
        padding-top: 24px;
      }

      .nav {
        align-items: flex-start;
        flex-direction: column;
        margin-bottom: 34px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .card-head {
        grid-template-columns: 44px minmax(0, 1fr);
      }

      .rank {
        width: 44px;
        height: 44px;
      }

      .metrics {
        grid-column: 1 / -1;
        justify-content: flex-start;
        min-width: 0;
      }

      .card h2 {
        font-size: 19px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="hero-inner">
        <nav class="nav" aria-label="页面信息">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true">
              <svg width="19" height="19" viewBox="0 0 24 24" fill="none">
                <path d="M4 7.5 12 3l8 4.5v9L12 21l-8-4.5v-9Z" stroke="currentColor" stroke-width="2" />
                <path d="m8.5 12 2.3 2.3 4.8-5.2" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </span>
            <span id="brandTitle">全球 TT 最新爆款分析</span>
          </div>
          <div class="nav-meta" id="navMeta"></div>
        </nav>

        <section class="hero-copy">
          <div class="eyebrow" id="heroEyebrow"></div>
          <h1 id="heroTitle">全球 TT 最新爆款分析</h1>
          <p id="heroDescription"></p>
        </section>
      </div>
    </header>

    <section class="stats" aria-label="数据概览">
      <div class="stat">
        <strong id="statTotal">0</strong>
        <span id="statTotalLabel">收录素材</span>
      </div>
      <div class="stat">
        <strong id="statLikes">0</strong>
        <span id="statLikesLabel">累计点赞</span>
      </div>
      <div class="stat">
        <strong id="statTop">0</strong>
        <span id="statTopLabel">最高单条点赞</span>
      </div>
      <div class="stat">
        <strong id="statDate">-</strong>
        <span id="statRegionLabel">覆盖区域</span>
      </div>
    </section>

    <main class="content">
      <section class="day-filter-panel" aria-label="周选择">
        <div class="day-filter-head">
          <div>
            <h2 id="daySectionTitle">按周选择热点</h2>
            <p id="dayMeta">选择周期查看对应热点、区域趋势和视频素材流。</p>
          </div>
        </div>
        <div id="dayTabs" class="day-tabs"></div>
      </section>

      <section class="trend-summary" aria-label="趋势总结">
        <h2 id="summaryTitle">区域趋势总结</h2>
        <div id="trendGrid" class="trend-grid"></div>
      </section>

      <section class="region-filter-panel" aria-label="地区筛选">
        <h2 id="regionSectionTitle">地区筛选</h2>
        <div id="regionChips" class="region-chips"></div>
      </section>

      <section class="toolbar" aria-label="筛选工具">
        <label class="field">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="m21 21-4.3-4.3m1.3-5.2a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
          <input id="searchInput" class="search" type="search" placeholder="搜索主题、标签、原文、分析..." />
        </label>

        <select id="categorySelect" class="select" aria-label="类型筛选">
          <option value="all">全部类型</option>
        </select>

        <select id="sortSelect" class="select" aria-label="排序方式">
          <option value="likes-desc">点赞数从高到低</option>
          <option value="date-desc">发布时间从新到旧</option>
          <option value="rank-asc">编号从小到大</option>
        </select>

        <select id="tagSelect" class="select" aria-label="标签筛选">
          <option value="all">全部标签</option>
        </select>
      </section>

      <section class="layout">
        <div>
          <div id="cardList" class="list" aria-live="polite"></div>
          <div id="emptyState" class="empty">没有找到匹配的素材，换个关键词或筛选条件试试。</div>
        </div>

      </section>
    </main>
  </div>

  <div id="toast" class="toast" role="status">已复制链接</div>

  <template id="cardTemplate">
    <article class="card feed-card">
      <div class="info-panel">
        <div class="card-head">
          <div class="rank"></div>
          <div class="title-wrap">
            <div class="category"></div>
            <h2></h2>
          </div>
          <div class="metrics"></div>
        </div>
        <div class="card-body">
          <div class="tags"></div>
          <p class="analysis"></p>
          <p class="caption"></p>
          <div class="actions"></div>
        </div>
      </div>
      <div class="video-panel">
        <div class="video-frame"></div>
      </div>
    </article>
  </template>

  <script src="./data.js"></script>
  <script>
    const pageMeta = window.TT_PAGE_META || {};
    const reportDays = window.TT_HOTSPOT_DATA || [];

    let activeDayId = reportDays[0] ? reportDays[0].id : "";
    let selectedRegion = "all";

    const els = {
      dayTabs: document.querySelector("#dayTabs"),
      dayMeta: document.querySelector("#dayMeta"),
      search: document.querySelector("#searchInput"),
      category: document.querySelector("#categorySelect"),
      tag: document.querySelector("#tagSelect"),
      sort: document.querySelector("#sortSelect"),
      list: document.querySelector("#cardList"),
      empty: document.querySelector("#emptyState"),
      template: document.querySelector("#cardTemplate"),
      toast: document.querySelector("#toast"),
      summaryTitle: document.querySelector("#summaryTitle"),
      brandTitle: document.querySelector("#brandTitle"),
      navMeta: document.querySelector("#navMeta"),
      heroEyebrow: document.querySelector("#heroEyebrow"),
      heroTitle: document.querySelector("#heroTitle"),
      heroDescription: document.querySelector("#heroDescription"),
      statTotalLabel: document.querySelector("#statTotalLabel"),
      statLikesLabel: document.querySelector("#statLikesLabel"),
      statTopLabel: document.querySelector("#statTopLabel"),
      statRegionLabel: document.querySelector("#statRegionLabel"),
      daySectionTitle: document.querySelector("#daySectionTitle"),
      regionSectionTitle: document.querySelector("#regionSectionTitle"),
      regionChips: document.querySelector("#regionChips"),
      trendGrid: document.querySelector("#trendGrid"),
      statTotal: document.querySelector("#statTotal"),
      statLikes: document.querySelector("#statLikes"),
      statTop: document.querySelector("#statTop"),
      statDate: document.querySelector("#statDate")
    };

    function getActiveDay() {
      return reportDays.find((day) => day.id === activeDayId) || reportDays[0] || { materials: [], regionSummaries: [] };
    }

    function metaText(key, fallback = "") {
      return Object.prototype.hasOwnProperty.call(pageMeta, key) ? pageMeta[key] : fallback;
    }

    function applyText(element, value) {
      if (!element) return;
      const text = value == null ? "" : String(value);
      element.textContent = text;
      element.hidden = text.trim() === "";
    }

    function applyPageMeta() {
      const siteTitle = metaText("siteTitle");
      if (siteTitle.trim()) document.title = siteTitle;
      applyText(els.brandTitle, metaText("brandTitle", siteTitle));
      applyText(els.navMeta, metaText("navMeta"));
      applyText(els.heroEyebrow, metaText("eyebrow"));
      applyText(els.heroTitle, metaText("heroTitle", siteTitle));
      applyText(els.heroDescription, metaText("heroDescription"));
      applyText(els.statTotalLabel, metaText("statTotalLabel"));
      applyText(els.statLikesLabel, metaText("statLikesLabel"));
      applyText(els.statTopLabel, metaText("statTopLabel"));
      applyText(els.statRegionLabel, metaText("statRegionLabel"));
      applyText(els.daySectionTitle, metaText("daySectionTitle"));
      applyText(els.summaryTitle, metaText("trendSectionTitle"));
      applyText(els.regionSectionTitle, metaText("regionSectionTitle"));
      els.search.placeholder = metaText("searchPlaceholder");
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("zh-CN").format(value);
    }

    function resetSelect(select, label, options) {
      const current = select.value;
      select.innerHTML = "";
      const allOption = document.createElement("option");
      allOption.value = "all";
      allOption.textContent = label;
      select.append(allOption);

      options.forEach((value) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.append(option);
      });

      select.value = options.includes(current) ? current : "all";
    }

    function populateFilters() {
      const day = getActiveDay();
      const categories = [...new Set(day.materials.map((item) => item.category))].sort();
      const tags = [...new Set(day.materials.flatMap((item) => item.tags))].sort();
      resetSelect(els.category, "全部类型", categories);
      resetSelect(els.tag, "全部标签", tags);
    }

    function updateStats() {
      const day = getActiveDay();
      const totalLikes = day.materials.reduce((sum, item) => sum + item.likes, 0);
      const topLikes = Math.max(...day.materials.map((item) => item.likes));
      const regionCount = new Set(day.materials.map((item) => item.region)).size;

      els.statTotal.textContent = formatNumber(day.materials.length);
      els.statLikes.textContent = formatNumber(totalLikes);
      els.statTop.textContent = formatNumber(topLikes);
      els.statDate.textContent = `${regionCount} 个`;
      els.dayMeta.textContent = `当前周期：${day.label} · ${day.rangeLabel} · ${day.materials.length} 条素材 · ${regionCount} 个区域`;
    }

    function getFilteredMaterials() {
      const day = getActiveDay();
      const keyword = els.search.value.trim().toLowerCase();
      const category = els.category.value;
      const tag = els.tag.value;
      const sort = els.sort.value;

      const filtered = day.materials.filter((item) => {
        const haystack = [
          item.title,
          item.region,
          item.category,
          item.analysis,
          item.caption,
          item.url,
          ...item.tags
        ]
          .join(" ")
          .toLowerCase();

        const keywordMatched = !keyword || haystack.includes(keyword);
        const regionMatched = selectedRegion === "all" || item.region === selectedRegion;
        const categoryMatched = category === "all" || item.category === category;
        const tagMatched = tag === "all" || item.tags.includes(tag);

        return keywordMatched && regionMatched && categoryMatched && tagMatched;
      });

      return filtered.sort((a, b) => {
        if (selectedRegion === "all") {
          return a.id - b.id;
        }
        if (sort === "date-desc") {
          return b.publishDate.localeCompare(a.publishDate) || b.likes - a.likes;
        }
        if (sort === "rank-asc") {
          return (a.localRank - b.localRank) || (a.id - b.id);
        }
        return b.likes - a.likes;
      });
    }

    function showToast(text) {
      els.toast.textContent = text;
      els.toast.classList.add("show");
      window.setTimeout(() => els.toast.classList.remove("show"), 1600);
    }

    async function copyLink(url) {
      if (!url) {
        showToast("这条素材还没有填写链接");
        return;
      }

      try {
        await navigator.clipboard.writeText(url);
        showToast("已复制链接");
      } catch {
        showToast("浏览器不允许自动复制，请手动复制");
      }
    }

    function createMetric(text) {
      const node = document.createElement("span");
      node.className = "metric";
      node.textContent = text;
      return node;
    }

    function renderDayTabs() {
      els.dayTabs.innerHTML = "";
      reportDays.forEach((day) => {
        const button = document.createElement("button");
        button.className = `day-chip${activeDayId === day.id ? " is-active" : ""}`;
        button.type = "button";
        const note = day.note ? `<span>${escapeHtml(day.note)}</span>` : "";
        button.innerHTML = `<strong>${escapeHtml(day.label)}</strong><span>${escapeHtml(day.rangeLabel)} · ${day.materials.length} 条</span>${note}`;
        button.addEventListener("click", () => {
          activeDayId = day.id;
          selectedRegion = "all";
          els.search.value = "";
          els.category.value = "all";
          els.tag.value = "all";
          renderPage({ repopulateFilters: true });
        });
        els.dayTabs.append(button);
      });
    }

    function renderRegionSummaries() {
      const day = getActiveDay();
      els.summaryTitle.textContent = `${day.label} 区域趋势总结`;
      els.trendGrid.innerHTML = "";

      day.regionSummaries.forEach((item) => {
        const article = document.createElement("article");
        article.className = "trend-item";
        article.innerHTML = `
          <strong><span class="region-name">${escapeHtml(item.region)}</span> · ${escapeHtml(item.topic)}</strong>
          <p>${escapeHtml(item.summary)}</p>
        `;
        els.trendGrid.append(article);
      });
    }

    function renderRegionButtons() {
      const day = getActiveDay();
      els.regionChips.innerHTML = "";

      const allButton = document.createElement("button");
      allButton.className = `region-chip${selectedRegion === "all" ? " is-active" : ""}`;
      allButton.type = "button";
      allButton.textContent = "全部区域";
      allButton.addEventListener("click", () => {
        selectedRegion = "all";
        renderPage();
      });
      els.regionChips.append(allButton);

      day.regionSummaries.forEach((item) => {
        const chip = document.createElement("button");
        chip.className = `region-chip${selectedRegion === item.region ? " is-active" : ""}`;
        chip.type = "button";
        chip.textContent = `${item.region} · ${item.itemCount} 条`;
        chip.addEventListener("click", () => {
          selectedRegion = item.region;
          renderPage();
        });
        els.regionChips.append(chip);
      });
    }

    function getTikTokVideoId(url) {
      return url.match(/\/video\/(\d+)/)?.[1] || "";
    }

    function createVideoEmbed(item) {
      const videoId = getTikTokVideoId(item.url);
      const wrapper = document.createElement("div");

      if (!item.url || !videoId) {
        wrapper.className = "video-fallback";
        wrapper.innerHTML = `
          <strong>暂无视频预览</strong>
          <p>这条素材还没有可嵌入的 TikTok 链接。</p>
        `;
        return wrapper;
      }

      const iframe = document.createElement("iframe");
      iframe.className = "tiktok-iframe";
      iframe.title = item.title;
      iframe.loading = "lazy";
      iframe.allow = "autoplay; encrypted-media; picture-in-picture; fullscreen";
      iframe.allowFullscreen = true;
      iframe.referrerPolicy = "strict-origin-when-cross-origin";
      const playToken = `${Date.now()}-${Math.random().toString(36).slice(2)}`;
      iframe.src = `https://www.tiktok.com/embed/v2/${videoId}?autoplay=1&muted=1&loop=1&theme=dark&playToken=${playToken}`;
      return iframe;
    }

    function createVideoOverlay(item) {
      const overlay = document.createElement("div");
      overlay.className = "video-overlay";

      const tagHtml = item.tags
        .slice(0, 4)
        .map((tag) => `<span class="overlay-pill">${escapeHtml(tag)}</span>`)
        .join("");

      overlay.innerHTML = `
        <div class="overlay-content">
          <div class="overlay-kicker">
            <span>${escapeHtml(item.region)} · ${escapeHtml(item.category)}</span>
            <span class="overlay-rank">${String(item.id).padStart(2, "0")}</span>
          </div>
          <h3 class="overlay-title">${escapeHtml(item.title)}</h3>
          <div class="overlay-metrics">
            <span class="overlay-pill">区域第 ${item.localRank} 条</span>
            <span class="overlay-pill">${formatNumber(item.likes)} 点赞</span>
            <span class="overlay-pill">${escapeHtml(item.publishDate)}</span>
          </div>
          <div class="overlay-tags">${tagHtml}</div>
          <div class="overlay-analysis"><strong>对视频的解析：</strong>${escapeHtml(item.analysis)}</div>
        </div>
        <div class="overlay-hint">鼠标悬停从头加载并播放，移开即停止</div>
      `;
      return overlay;
    }

    function setCardPlayback(article, item, shouldPlay) {
      const videoFrame = article.querySelector(".video-frame");
      if (!videoFrame || !item.url) return;

      if (shouldPlay) {
        if (!videoFrame.querySelector(".tiktok-iframe")) {
          videoFrame.append(createVideoEmbed(item));
        }
      } else {
        videoFrame.querySelectorAll(".tiktok-iframe").forEach((iframe) => {
          iframe.src = "about:blank";
          iframe.remove();
        });
        videoFrame.querySelectorAll(".video-fallback").forEach((node) => node.remove());
      }
      article.classList.toggle("is-playing", shouldPlay);
    }

    function renderCards() {
      const items = getFilteredMaterials();
      els.list.innerHTML = "";
      els.empty.style.display = items.length ? "none" : "block";

      items.forEach((item) => {
        const fragment = els.template.content.cloneNode(true);
        const article = fragment.querySelector(".card");
        const rank = fragment.querySelector(".rank");
        const category = fragment.querySelector(".category");
        const title = fragment.querySelector("h2");
        const metrics = fragment.querySelector(".metrics");
        const tags = fragment.querySelector(".tags");
        const analysis = fragment.querySelector(".analysis");
        const caption = fragment.querySelector(".caption");
        const actions = fragment.querySelector(".actions");
        const videoFrame = fragment.querySelector(".video-frame");

        article.dataset.id = `${activeDayId}-${item.id}`;
        rank.textContent = String(item.id).padStart(2, "0");
        category.textContent = `${item.region} · ${item.category}`;
        title.textContent = item.title;
        metrics.append(
          createMetric(`区域第 ${item.localRank} 条`),
          createMetric(`${formatNumber(item.likes)} 点赞`),
          createMetric(item.publishDate)
        );

        item.tags.forEach((tag) => {
          const node = document.createElement("span");
          node.className = "tag";
          node.textContent = tag;
          tags.append(node);
        });

        analysis.innerHTML = `<strong>对视频的解析：</strong>${escapeHtml(item.analysis)}`;
        caption.innerHTML = `<strong>该条视频原文：</strong>${escapeHtml(item.caption)}`;
        videoFrame.append(createVideoOverlay(item));
        article.addEventListener("mouseenter", () => setCardPlayback(article, item, true));
        article.addEventListener("mouseleave", () => setCardPlayback(article, item, false));
        article.addEventListener("focusin", () => setCardPlayback(article, item, true));
        article.addEventListener("focusout", () => setCardPlayback(article, item, false));

        const openLink = document.createElement("a");
        openLink.className = "btn btn-primary";
        openLink.target = "_blank";
        openLink.rel = "noreferrer";
        openLink.href = item.url || "#";
        openLink.textContent = item.url ? "打开原视频" : "待补充链接";
        if (!item.url) {
          openLink.addEventListener("click", (event) => event.preventDefault());
        }

        const copyButton = document.createElement("button");
        copyButton.className = "btn btn-ghost";
        copyButton.type = "button";
        copyButton.textContent = "复制链接";
        copyButton.addEventListener("click", () => copyLink(item.url));

        actions.append(openLink, copyButton);
        els.list.append(fragment);
      });

    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function renderPage(options = {}) {
      if (options.repopulateFilters) populateFilters();
      renderDayTabs();
      updateStats();
      renderRegionSummaries();
      renderRegionButtons();
      renderCards();
    }

    [els.search, els.category, els.tag, els.sort].forEach((control) => {
      control.addEventListener("input", renderPage);
    });

    applyPageMeta();
    populateFilters();
    renderPage();
  </script>
</body>
</html>
